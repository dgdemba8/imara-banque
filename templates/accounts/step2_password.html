{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="row justify-content-center" style="min-height: 80vh; align-items: center; display: flex;">
<div class="col-md-5 col-lg-4">

    <div class="card" style="border-top: 3px solid var(--champagne) !important; border-radius: var(--radius-lg); overflow: hidden;">

    <!-- En-tête -->
    <div class="card-header bg-primary text-white text-center" style="padding: 2rem 2rem 1.75rem; border-left: 4px solid var(--champagne) !important;">
        <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 0.4rem;">
        <img src="{% static 'images/logo.png' %}"
            alt="Thorys Bank"
            style="width: 64px; height: 64px; object-fit: contain;">
        <span style="
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            font-style: italic;
        ">Imara Banque</span>
        </div>
        <p class="mb-0" style="font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--champagne);">Espace client sécurisé</p>
    </div>

    <!-- Corps -->
    <div class="card-body" style="padding: 2rem 2rem 2.25rem;">

        <!-- Indicateur étape -->
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem;">
        <div style="display: flex; gap: 6px;">
            <div style="width: 22px; height: 22px; border-radius: 50%; background: #4a7c59; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
            <i class="fas fa-check" style="font-size: 9px; color: #fff;"></i>
            </div>
            <div style="width: 22px; height: 22px; border-radius: 50%; background: var(--champagne); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
            <span style="font-size: 0.68rem; font-weight: 500; color: var(--black);">2</span>
            </div>
        </div>
        <span style="font-size: 0.75rem; color: var(--gray-mid); letter-spacing: 0.06em; text-transform: uppercase;">Authentification</span>
        </div>

        <!-- Utilisateur identifié -->
        <div style="display: flex; align-items: center; gap: 10px; background: var(--off-white); border: 1px solid var(--gray-light); border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1.5rem;">
        <div style="width: 34px; height: 34px; border-radius: 50%; background: rgba(45,55,72,0.1); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
            <i class="fas fa-user" style="font-size: 13px; color: var(--slate-dark);"></i>
        </div>
        <div>
            <p style="margin: 0; font-size: 0.68rem; color: var(--gray-mid); letter-spacing: 0.07em; text-transform: uppercase;">Utilisateur identifié</p>
            <p style="margin: 0; font-size: 0.95rem; font-weight: 500; color: var(--black); font-family: 'Cormorant Garamond', serif;">{{ username }}</p>
        </div>
        </div>

        {% if erreur %}
        <div class="alert alert-danger" role="alert">
        <i class="fas fa-exclamation-circle me-2" style="font-size: 13px;"></i>{{ erreur }}
        </div>
        {% endif %}

        <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Mot de passe</label>
            <div style="position: relative;">
            <input
                type="password"
                name="password"
                id="passwordInput"
                class="form-control"
                placeholder="••••••••••"
                style="padding-right: 2.6rem;"
                required
                autofocus
            >
            <button
                type="button"
                onclick="var i=document.getElementById('passwordInput'); var icon=document.getElementById('eyeIcon'); if(i.type==='password'){i.type='text'; icon.className='fas fa-eye-slash';}else{i.type='password'; icon.className='fas fa-eye';}"
                style="position: absolute; right: 0.85rem; top: 50%; transform: translateY(-50%); background: none; border: none; padding: 0; cursor: pointer; color: var(--gray-mid);"
            >
                <i id="eyeIcon" class="fas fa-eye" style="font-size: 13px;"></i>
            </button>
            </div>
        </div>

        <div class="d-grid" style="margin-top: 1.5rem;">
            <button type="submit" class="btn btn-primary" style="display: flex; align-items: center; justify-content: center; gap: 8px;">
            <i class="fas fa-lock" style="font-size: 12px;"></i>
            <span>Se connecter</span>
            </button>
        </div>
        </form>

        <!-- Lien retour -->
        <div class="text-center" style="margin-top: 1.25rem;">
        <a href="{% url 'etape1_username' %}" style="display: inline-flex; align-items: center; gap: 5px; font-size: 0.78rem; color: var(--gray-mid); text-decoration: none; letter-spacing: 0.04em; transition: color 0.2s ease;"
            onmouseover="this.style.color='var(--champagne)'"
            onmouseout="this.style.color='var(--gray-mid)'">
            <i class="fas fa-arrow-left" style="font-size: 10px;"></i>
            Changer d'utilisateur
        </a>
        </div>

        <hr style="margin: 1.5rem 0;">

        <div style="display: flex; align-items: center; justify-content: center; gap: 6px; color: var(--gray-mid);">
        <i class="fas fa-shield-alt" style="font-size: 11px;"></i>
        <span style="font-size: 0.72rem; letter-spacing: 0.04em;">Connexion sécurisée SSL 256 bits</span>
        </div>

    </div>
    </div>

</div>
</div>
{% endblock %}
